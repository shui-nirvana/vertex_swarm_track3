[tool.ruff]
line-length = 120
target-version = "py310"
extend-exclude = [
  "artifacts",
  "evidence",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
]
ignore = [
  "E501",
]

[tool.ruff.lint.isort]
known-first-party = ["agent_tmp", "security_monitor"]

[tool.mypy]
python_version = "3.10"
files = ["agent_tmp", "security_monitor"]
ignore_missing_imports = true
show_error_codes = true
warn_unused_ignores = true
warn_redundant_casts = false
pretty = true
exclude = "(^artifacts/|^evidence/)"
